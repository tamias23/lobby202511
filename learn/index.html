<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Tutorial - Rules & Mechanics</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Inter:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <aside id="sidebar">
        <div class="logo">Game Tutorial</div>
        <div class="language-select">
            <select id="language-switcher">
                <option value="en" selected>English</option>
                <option value="fr">Français</option>
            </select>
        </div>
        <nav>
            <ul id="menu">
                <li data-section="intro" class="active"></li>
                <li data-section="setup_phase"></li>
                <li data-section="board"></li>
                <li data-section="turn"></li>
                <li data-section="goddess"></li>
                <li data-section="heroe"></li>
                <li data-section="mage"></li>
                <li data-section="siren"></li>
                <li data-section="ghoul"></li>
                <li data-section="soldier"></li>
                <li data-section="global_overview"></li>
            </ul>
        </nav>
    </aside>

    <main id="main-content" class="visible">
        <div id="content-container">
            <!-- Content will be injected here by app.js -->
            <div class="loading-spinner"></div>
        </div>
    </main>

    <script src="translations.js"></script>
    <script src="app.js"></script>
</body>
</html>
