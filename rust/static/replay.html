<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rust Native Replay Engine</title>
    <style>
        body {
            background-color: #111827;
            color: #f3f4f6;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #top-bar {
            height: 70px;
            padding: 0 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1e1e2f;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 100;
            flex-shrink: 0;
        }

        .left-group {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        #turn-hud {
            padding: 6px 16px;
            background: #111827;
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
            border: 1px solid #374151;
            white-space: nowrap;
        }

        #color-picker-ui {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #replay-hud {
            display: flex;
            gap: 8px;
        }

        #game-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            box-sizing: border-box;
            background: #1f2937;
        }

        svg {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.06);
            width: 100%;
            height: 100%;
            max-width: 95vw;
            max-height: 88vh;
        }

        .side-black { fill: #000; }
        .side-white { fill: #fff; stroke: #000; stroke-width: 2px; }
        .text-black { fill: #fff; font-size: 14px; font-weight: bold; text-anchor: middle; dominant-baseline: central;}
        .text-white { fill: #000; font-size: 14px; font-weight: bold; text-anchor: middle; dominant-baseline: central;}
    </style>
</head>
<body>
    <div id="top-bar">
        <div class="left-group">
            <h1 style="font-size: 20px; font-weight: 800; margin: 0; background: linear-gradient(to right, #10b981, #3b82f6); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Replay Engine</h1>
            <div id="replay-hud"></div>
            <div id="turn-hud">Loading...</div>
        </div>

        <div id="color-picker-ui"></div>

        <div style="display: flex; align-items: center;">
            <label for="game-selector" style="font-weight: bold; margin-right: 10px; font-size: 14px;">Game:</label>
            <select id="game-selector" style="background: #374151; color: white; border: 1px solid #4b5563; padding: 8px 12px; border-radius: 6px; font-family: monospace; font-size: 13px; cursor: pointer; outline: none; max-width: 300px;">
                <option value="">Loading...</option>
            </select>
        </div>
    </div>

    <div id="game-container">
        <!-- SVG Canvas initialized by replay.js -->
    </div>
    
    <script src="/replay.js?v=2"></script>
</body>
</html>
