<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dedal — Maintenance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0f14;
      font-family: 'Outfit', sans-serif;
      color: #e2e8f0;
      overflow: hidden;
    }

    /* animated gradient orbs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      animation: drift 14s ease-in-out infinite alternate;
      pointer-events: none;
    }
    body::before {
      width: 520px; height: 520px;
      background: radial-gradient(circle, #46b0d4, transparent 70%);
      top: -120px; left: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #f27813, transparent 70%);
      bottom: -80px; right: -80px;
      animation-delay: -7s;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    .card {
      position: relative;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 24px;
      padding: 56px 64px;
      text-align: center;
      max-width: 480px;
      width: 90%;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    .logo {
      font-size: 36px;
      font-weight: 800;
      background: linear-gradient(135deg, #46b0d4, #f27813);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .gear {
      font-size: 52px;
      display: block;
      margin: 24px auto 20px;
      animation: spin 6s linear infinite;
      filter: drop-shadow(0 0 12px rgba(70,176,212,0.4));
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      font-weight: 300;
      color: #94a3b8;
      line-height: 1.7;
    }

    .dot-wave {
      display: inline-flex;
      gap: 5px;
      margin-top: 28px;
    }
    .dot-wave span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: linear-gradient(135deg, #46b0d4, #f27813);
      animation: wave 1.4s ease-in-out infinite;
      opacity: 0.7;
    }
    .dot-wave span:nth-child(2) { animation-delay: 0.2s; }
    .dot-wave span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes wave {
      0%, 100% { transform: translateY(0); opacity: 0.5; }
      50%       { transform: translateY(-8px); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Dedal</div>
    <span class="gear">⚙️</span>
    <h1>We'll be back soon</h1>
    <p>
      The server is undergoing scheduled maintenance.<br />
      This won't take long — check back in a few minutes.
    </p>
    <div class="dot-wave">
      <span></span><span></span><span></span>
    </div>
  </div>
</body>
</html>
