# Nginx needs to listen on port 8080 — Cloud Run injects $PORT=8080
# Use envsubst to substitute the $PORT variable in the config at container start
server {
    listen       8080;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # No access logs — keep Cloud Run logs clean
    access_log off;
    error_log  /dev/stderr warn;
}
