# nginx-podman.conf — Load balancer for multi-replica nd6-app containers.
#
# Podman Compose DNS resolves the service name "nd6-app" to all replica IPs.
# ip_hash ensures Socket.IO polling-transport sessions stick to the same backend.
# WebSocket connections (the primary transport) are long-lived and don't need
# stickiness, but the fallback polling path does.

upstream nd6_backend {
    ip_hash;
    server nd6-app:8080;
}

server {
    listen 8080;
    server_name _;

    # Increase client body size for potential file uploads (tournament exports, etc.)
    client_max_body_size 10m;

    location / {
        proxy_pass http://nd6_backend;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Pass real client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Match Cloud Run timeout (1 hour) for long-lived WebSocket connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Disable buffering for real-time events
        proxy_buffering off;
    }
}
