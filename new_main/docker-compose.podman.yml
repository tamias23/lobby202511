# docker-compose.podman.yml — Podman Compose deployment for Dedal.
#
# Usage:
#   podman compose -f docker-compose.podman.yml up -d --scale nd6-app=5
#   podman compose -f docker-compose.podman.yml --profile tunnel up -d
#   podman compose -f docker-compose.podman.yml down
#
# Environment variables (set in shell or .env file):
#   TAG              — image tag (default: latest)
#   CF_TUNNEL_TOKEN  — Cloudflare tunnel token (required for tunnel profile)
#   APP_URL          — public URL for the app (default: https://dedalthegame.com)

services:
  # ── Valkey (Redis-compatible backplane) ──────────────────────────────────
  valkey:
    image: docker.io/valkey/valkey:latest
    container_name: dedal-valkey
    restart: unless-stopped
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Firestore Emulator (persistent) ─────────────────────────────────────
  firestore:
    image: docker.io/google/cloud-sdk:emulators
    container_name: dedal-firestore
    restart: unless-stopped
    stop_grace_period: 60s
    volumes:
      - /home/mat/Bureau/dedalthegame/firestore_db:/opt/data:Z
    entrypoint: /bin/bash
    command:
      - -c
      - |
        ARGS="--host-port=0.0.0.0:8080 --project=my-local-firestore --export-on-exit=/opt/data/export"
        if [ -f /opt/data/export/overall_export_metadata ]; then
          echo "Found existing export data, importing..."
          ARGS="$$ARGS --import-data=/opt/data/export/overall_export_metadata"
        else
          echo "No existing export data found, starting fresh."
          mkdir -p /opt/data/export
        fi
        exec gcloud beta emulators firestore start $$ARGS
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Firestore periodic backup (every 15 min) ───────────────────────────
  firestore-backup:
    image: docker.io/library/alpine:latest
    container_name: dedal-firestore-backup
    restart: unless-stopped
    depends_on:
      - firestore
    volumes:
      - /home/mat/Bureau/dedalthegame/firestore_db:/opt/data:Z
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl > /dev/null 2>&1
        echo "Firestore backup sidecar started (every 15 min)"
        while true; do
          sleep 900
          echo "[$(date -u)] Triggering Firestore export..."
          if curl -sf -X POST "http://firestore:8080/emulator/v1/projects/my-local-firestore:export" \
            -H "Content-Type: application/json" \
            -d '{"database":"projects/my-local-firestore/databases/(default)","export_directory":"/opt/data/export"}'; then
            echo " Export OK — pruning old snapshots..."
            # Keep only the newest timestamped subdir; delete all others
            ls -1dt /opt/data/export/firestore_export_* 2>/dev/null | tail -n +2 | xargs rm -rf
            echo " Pruned. Kept: $(ls -1d /opt/data/export/firestore_export_* 2>/dev/null | tail -1)"
          else
            echo " Export FAILED"
          fi
        done

  # ── Bot Server (Rust) ───────────────────────────────────────────────────
  bot-server:
    image: localhost/bot-server:${TAG:-latest}
    container_name: dedal-bot-server
    restart: unless-stopped
    environment:
      - PORT=8080
      - MODELS_DIR=/app/models
      - RUST_LOG=warn
      - ORT_LOGGING_LEVEL=3
    healthcheck:
      test: ["CMD-SHELL", "cat < /dev/tcp/localhost/8080 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── nd6-app (Node.js game server + Flutter frontend) ────────────────────
  # Scale with: --scale nd6-app=N
  nd6-app:
    image: localhost/node-docker06:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      - valkey
      - firestore
      - bot-server
    environment:
      # Server
      APP_URL: "${APP_URL:-https://dedalthegame.com}"
      PORT: "8080"
      LOG_LEVEL: "info"
      NODE_ENV: "production"
      # Game offload to local volume (GCS_BUCKET enables the job; value unused locally)
      GCS_BUCKET: "local"
      # JWT
      JWT_SECRET: "d4e8f1a2b3c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1"
      JWT_EXPIRY_DAYS: "7"
      # Email (Nodemailer)
      EMAIL_SERVICE: "gmail"
      EMAIL_USER: "iiiiiiiiiiii@gmail.com"
      EMAIL_PASS: "iiii iiii iiii iiii"
      # Bot
      BOT_SERVER_URL: "http://bot-server:8080"
      BOT_POLL_INTERVAL_MS: "120000"
      BOT_MOVE_DELAY_MS: "500"
      MCTS_DEFAULT_BUDGET_MS: "500"
      BOT_MATCH_INTERVAL_MS: "3600000"
      BOT_MATCH_PROBABILITY: "0.01"
      # Tournaments
      TOURNAMENTS_ENABLED: "true"
      MAX_CONCURRENT_TOURNAMENTS: "20"
      MAX_BOTS_IN_TOURNAMENTS: "20"
      TOURNAMENT_WIN_POINTS: "1"
      TOURNAMENT_DRAW_POINTS: "0.5"
      TOURNAMENT_LOSS_POINTS: "0"
      TOURNAMENT_MAX_AGE_HOURS: "6"
      TOURNAMENT_OPEN_EXPIRY_HOURS: "2"
      # Valkey backplane
      VALKEY_ENABLED: "true"
      VALKEY_HOST: "valkey"
      VALKEY_PORT: "6379"
      # Firestore
      FIRESTORE_EMULATOR_HOST: "firestore:8080"
      FIRESTORE_PROJECT_ID: "my-local-firestore"
      # Game history offload (local volume, no GCS)
      GAME_RETENTION_DAYS: "3"
      GAME_OFFLOAD_INTERVAL_HOURS: "24"
    volumes:
      - /home/mat/Bureau/dedalthegame/parquet:/mnt/db:Z

  # ── Nginx load balancer ─────────────────────────────────────────────────
  nginx:
    image: docker.io/library/nginx:alpine
    container_name: dedal-nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./nginx-podman.conf:/etc/nginx/conf.d/default.conf:ro,Z
    depends_on:
      - nd6-app

  # ── Cloudflare Tunnel (opt-in) ──────────────────────────────────────────
  tunnel:
    image: docker.io/cloudflare/cloudflared:latest
    container_name: dedal-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      - nginx
    profiles:
      - tunnel

volumes:
  valkey-data:
