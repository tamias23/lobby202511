# docker-compose.podman.yml — Podman Compose deployment for Dedal.
#
# Usage:
#   podman compose -f docker-compose.podman.yml up -d --scale nd6-app=3
#   podman compose -f docker-compose.podman.yml --profile tunnel up -d
#   podman compose -f docker-compose.podman.yml down
#
# Environment variables (set in shell or .env file):
#   TAG              — image tag (default: latest)
#   CF_TUNNEL_TOKEN  — Cloudflare tunnel token (required for tunnel profile)
#   APP_URL          — public URL for the app (default: https://dedalthegame.com)

services:
  # ── Valkey (Redis-compatible backplane) ──────────────────────────────────
  valkey:
    image: docker.io/valkey/valkey:latest
    container_name: dedal-valkey
    restart: unless-stopped
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ── PostgreSQL (persistent relational database) ─────────────────────────
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: dedal-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dedalthegame01
      POSTGRES_USER: tamias23
      POSTGRES_PASSWORD: "TY-rre__U@345"
    volumes:
      - /home/mat/Bureau/dedalthegame/PSQL:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tamias23 -d dedalthegame01"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ── Bot Server (Rust) ───────────────────────────────────────────────────
  bot-server:
    image: localhost/bot-server:${TAG:-latest}
    container_name: dedal-bot-server
    restart: unless-stopped
    environment:
      - PORT=8080
      - MODELS_DIR=/app/models
      - RUST_LOG=warn
      - ORT_LOGGING_LEVEL=3
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 128M
        reservations:
          cpus: "0.5"
          memory: 128M

  # ── nd6-app (Node.js game server + Flutter frontend) ────────────────────
  # Scale with: --scale nd6-app=N
  nd6-app:
    image: localhost/node-docker06:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      - valkey
      - postgres
      - bot-server
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2500M
        reservations:
          cpus: "0.5"
          memory: 512M
    environment:
      # Server
      APP_URL: "${APP_URL:-https://dedalthegame.com}"
      PORT: "8080"
      LOG_LEVEL: "info"
      NODE_ENV: "production"
      # Game offload to local volume (GCS_BUCKET enables the job; value unused locally)
      GCS_BUCKET: "local"
      # JWT
      JWT_SECRET: "d4e8f1a2b3c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1"
      JWT_EXPIRY_DAYS: "7"
      # Email (Nodemailer)
      EMAIL_SERVICE: "gmail"
      EMAIL_USER: "iiiiiiiiiiii@gmail.com"
      EMAIL_PASS: "iiii iiii iiii iiii"
      # Bot
      BOT_SERVER_URL: "http://bot-server:8080"
      BOT_POLL_INTERVAL_MS: "120000"
      BOT_MOVE_DELAY_MS: "500"
      MCTS_DEFAULT_BUDGET_MS: "500"
      BOT_MATCH_INTERVAL_MS: "300000"
      BOT_MATCH_PROBABILITY: "0.5"
      # Tournaments
      TOURNAMENTS_ENABLED: "true"
      MAX_CONCURRENT_TOURNAMENTS: "20"
      MAX_BOTS_IN_TOURNAMENTS: "20"
      TOURNAMENT_WIN_POINTS: "1"
      TOURNAMENT_DRAW_POINTS: "0.5"
      TOURNAMENT_LOSS_POINTS: "0"
      TOURNAMENT_MAX_AGE_HOURS: "24"
      TOURNAMENT_OPEN_EXPIRY_HOURS: "24"
      # Valkey backplane
      VALKEY_ENABLED: "true"
      VALKEY_HOST: "valkey"
      VALKEY_PORT: "6379"
      # PostgreSQL
      PG_HOST: "postgres"
      PG_PORT: "5432"
      PG_DATABASE: "dedalthegame01"
      PG_USER: "tamias23"
      PG_PASSWORD: "TY-rre__U@345"
      # Game history offload (local volume, no GCS)
      GAME_RETENTION_DAYS: "3"
      SHOW_SUBSCRIBE_BUTTON: "false"
    volumes:
      - /home/mat/Bureau/dedalthegame/parquet:/mnt/db:Z

  # ── Nginx load balancer ─────────────────────────────────────────────────
  nginx:
    image: docker.io/library/nginx:alpine
    container_name: dedal-nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./nginx-podman.conf:/etc/nginx/conf.d/default.conf:ro,Z
    depends_on:
      - nd6-app
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ── Cloudflare Tunnel (opt-in) ──────────────────────────────────────────
  tunnel:
    image: docker.io/cloudflare/cloudflared:latest
    container_name: dedal-tunnel
    restart: unless-stopped
    # The origin URL is configured in the Cloudflare dashboard.
    # Set it to: http://nginx:8080  (compose service name, same network)
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      - nginx
    profiles:
      - tunnel
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 64M

volumes:
  valkey-data:
